<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公務生涯護身符</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="header">
      <h1>公務生涯護身符</h1>
      <p>點擊燈籠或搖晃手機，領取今日職場智慧</p>
      <button id="permission-btn" class="perm-btn" style="display: none">
        啟用手機搖晃求籤
      </button>
      <div id="shaker-container">
        <div id="shaker" class="shaker">🏮</div>
      </div>
    </div>

    <div id="result-section">
      <div class="fortune-header">
        <div id="display-fortune" class="fortune-title"></div>
        <div class="yi-ji-container">
          <div class="box yi">
            <b>【宜】</b><br /><span id="display-yi"></span>
          </div>
          <div class="box ji">
            <b>【忌】</b><br /><span id="display-ji"></span>
          </div>
        </div>
      </div>
      <div class="comic-container">
        <img id="display-comic" src="" class="comic-image" />
      </div>
      <div class="legal-tip">
        <b>💡 職場避雷針：</b><br /><span id="display-tip"></span>
      </div>
      <button class="retry-btn" onclick="location.reload()">重新求籤</button>

      <div class="footer-box">
        <p><b>文山區公所政風室 自製</b></p>
        <small>參考資料：法務部廉政署、各機關宣導案例</small>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
